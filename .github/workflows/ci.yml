name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python
        run: python -m py_compile install.py ilaas_agents/*.py proxies/*.py
      - name: Shell syntax
        run: bash -n Ilaas-codex Ilaas-claude Ilaas-opencode Ilaas-doctor Ilaas-servers install.sh
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Install docs dependencies
        run: python -m pip install -r docs/requirements.txt
      - name: Build docs
        run: python -m sphinx -b html -W --keep-going docs docs/_build/html
      - name: Clone isolated check
        run: python scripts/clone_isolated_check.py --workdir /tmp/ilaas-agent-ci-clone
